name: Skim
options:
  bundleIdPrefix: com.skim
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  FeedKit:
    url: https://github.com/nmdias/FeedKit.git
    from: "9.0.0"

targets:
  Skim:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Skim/Sources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationAllButUpsideDown"
        PRODUCT_BUNDLE_IDENTIFIER: com.skim.app
        PRODUCT_NAME: Skim
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    dependencies:
      - package: FeedKit
    resources:
      - path: Skim/Assets.xcassets
