name: SkimNative
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
packages:
  SkimCore:
    path: ../SkimCore
targets:
  Skim iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - SkimIOS
      - path: ../../src/assets/fonts/AquireBold.otf
        buildPhase: resources
    dependencies:
      - package: SkimCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gm2211.skim
        PRODUCT_NAME: Skim
        DEVELOPMENT_TEAM: 6KQV68SJ5P
        MARKETING_VERSION: 0.1.5
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Skim
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        CODE_SIGN_STYLE: Automatic
  Skim macOS:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - SkimMacOS
    dependencies:
      - package: SkimCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gm2211.skim.native.macos
        PRODUCT_NAME: Skim
        DEVELOPMENT_TEAM: 6KQV68SJ5P
        MARKETING_VERSION: 0.1.5
        CURRENT_PROJECT_VERSION: 3
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Skim
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.news
        CODE_SIGN_STYLE: Automatic
